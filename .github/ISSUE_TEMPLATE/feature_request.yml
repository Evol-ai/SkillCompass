name: Feature Request
description: Suggest a new feature or improvement
title: "[Feature] "
labels: [enhancement]
body:
  - type: checkboxes
    id: preflight
    attributes:
      label: Preflight Checklist
      options:
        - label: I searched existing issues and this hasn't been requested
          required: true

  - type: textarea
    id: problem
    attributes:
      label: Problem
      placeholder: What problem does this feature solve? What's the current pain point?
    validations:
      required: true

  - type: textarea
    id: solution
    attributes:
      label: Proposed solution
      placeholder: Describe what you'd like to happen.
    validations:
      required: true

  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
      placeholder: Any other approaches you've thought about.

  - type: textarea
    id: use_case
    attributes:
      label: Use case
      placeholder: Example skill, workflow, or scenario where this would help.

  - type: dropdown
    id: priority
    attributes:
      label: Priority to you
      options:
        - Nice to have
        - Important
        - Critical — blocking my workflow
    validations:
      required: true

  - type: checkboxes
    id: contribute
    attributes:
      label: Contribution
      options:
        - label: I'm willing to help implement this (submit a PR)
