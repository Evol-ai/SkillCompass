name: Verify

on:
  push:
    branches: [main, dev]
  pull_request:
    branches: [main, dev]

permissions:
  contents: read

jobs:
  verify-local:
    name: verify-local (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest]

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Fetch test fixtures
        run: git clone https://github.com/Evol-ai/SkillCompass-test-fixtures.git test-fixtures

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Install OC dependencies
        run: cd oc && npm ci

      - name: Build OpenClaw plugin
        run: npm run build:oc

      - name: Run local verification
        run: npm run verify:local

  verify-clawhub:
    name: verify-clawhub
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Fetch test fixtures
        run: git clone https://github.com/Evol-ai/SkillCompass-test-fixtures.git test-fixtures

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run ClawHub verification
        run: npm run verify:clawhub
